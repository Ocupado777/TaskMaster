<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TaskMaster 2.0 — Perfil</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-logo">TASKMASTER 2.0</div>

            <ul>
                <li><a href="dashboard.html"><img src="assets/img/icons/dashboard.svg" class="icon"><span>Dashboard</span></a></li>
                <li><a href="tareas.html"><img src="assets/img/icons/tareas.svg" class="icon"><span>Tareas</span></a></li>
                <li><a href="calendario.html"><img src="assets/img/icons/calendario.svg" class="icon"><span>Calendario</span></a></li>
                <li><a href="prioridades.html"><img src="assets/img/icons/prioridades.svg" class="icon"><span>Prioridades</span></a></li>
                <li><a href="estadisticas.html"><img src="assets/img/icons/estadisticas.svg" class="icon"><span>Estadísticas</span></a></li>
                <li><a href="recordatorios.html"><img src="assets/img/icons/recordatorios.svg" class="icon"><span>Recordatorios</span></a></li>
                <li><a href="configuracion.html"><img src="assets/img/icons/configuracion.svg" class="icon"><span>Configuración</span></a></li>
                
            </ul>

            <div class="theme-toggle">
                <img src="assets/img/icons/moon.svg" class="theme-icon" id="theme-icon">
                <span id="theme-label">Modo oscuro</span>
                <label class="switch">
                    <input type="checkbox" id="theme-switch">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="sidebar-user">
                <p class="user-name"></p>
                <p class="user-role"></p>
            </div>
        </div>

        <!-- CONTENEDOR PRINCIPAL -->
        <div style="flex: 1; display: flex; flex-direction: column;">

            <!-- HEADER -->
            <div class="header">
                <div class="header-left">
                    <h2>Perfil</h2>
                    <p class="header-subtitle">
                        Edita tu información personal y personaliza tu cuenta.
                    </p>
                </div>

                <div class="user-area">
                    <img src="assets/img/icons/notificaciones.svg" class="icon">
                    <span class="user-name"></span>
                    <img src="assets/img/icons/usuario.svg" class="icon">
                </div>
            </div>

            <!-- CONTENIDO -->
            <div class="content fade-in">

                <div class="perfil-card card">

                    <!-- AVATAR -->
                    <div class="perfil-avatar">
                        <div class="avatar-circle"></div>
                        <button class="btn btn-small">Cambiar color</button>
                    </div>

                    <!-- FORMULARIO -->
                    <div class="perfil-form">

                        <label>Nombre</label>
                        <input type="text" class="perfil-input" placeholder="Tu nombre">

                        <label>Descripción</label>
                        <textarea class="perfil-textarea" placeholder="Escribe algo sobre ti..."></textarea>

                        <button class="btn btn-save">Guardar cambios</button>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/globalUser.js"></script>
    <script src="js/theme.js"></script>

</body>
</html>
