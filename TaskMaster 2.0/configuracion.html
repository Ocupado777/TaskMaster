<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TaskMaster 2.0 — Configuración</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/configuracion.css">
</head>
<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <!-- LOGO -->
            <div class="sidebar-logo">
                <img src="assets/img/logo.png" class="sidebar-logo-img">
                <div class="sidebar-logo-text">
                    <span class="task">TASK</span><span class="master">MASTER</span>
                    <p class="sidebar-slogan">ORGANIZA · PLANIFICA · LOGRA</p>
                </div>
            </div>

            <ul>
                <li><a href="dashboard.html"><img src="assets/img/icons/dashboard.svg" class="icon"><span>Dashboard</span></a></li>
                <li><a href="tareas.html"><img src="assets/img/icons/tareas.svg" class="icon"><span>Tareas</span></a></li>
                <li><a href="calendario.html"><img src="assets/img/icons/calendario.svg" class="icon"><span>Calendario</span></a></li>
                <li><a href="prioridades.html"><img src="assets/img/icons/prioridades.svg" class="icon"><span>Prioridades</span></a></li>
                <li><a href="estadisticas.html"><img src="assets/img/icons/estadisticas.svg" class="icon"><span>Estadísticas</span></a></li>
                <li><a href="recordatorios.html"><img src="assets/img/icons/recordatorios.svg" class="icon"><span>Recordatorios</span></a></li>
                <li><a href="configuracion.html"><img src="assets/img/icons/configuracion.svg" class="icon"><span>Configuración</span></a></li>
            </ul>

            <div class="theme-toggle">
                <img src="assets/img/icons/moon.svg" class="theme-icon" id="theme-icon">
                <span id="theme-label">Modo oscuro</span>
                <label class="switch">
                    <input type="checkbox" id="theme-switch">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="sidebar-user">
                <p class="user-name"></p>
                <p class="user-role"></p>
            </div>
        </div>

        <!-- CONTENEDOR PRINCIPAL -->
        <div style="flex: 1; display: flex; flex-direction: column;">

            <!-- HEADER -->
            <div class="header">
                <div class="header-left">
                    <h2>Configuración</h2>
                    <p class="header-subtitle">
                        Personaliza tu experiencia en TaskMaster 2.0.
                    </p>
                </div>

                <div class="user-area">
                    <img src="assets/img/icons/notificaciones.svg" class="icon">
                    <span class="user-name"></span>
                    <img src="assets/img/icons/usuario.svg" class="icon">
                </div>
            </div>

            <!-- CONTENIDO -->
            <div class="content fade-in">

                <div class="config-grid">

                    <!-- TEMA -->
                    <div class="card config-card">
                        <h3>Tema</h3>
                        <select class="config-select">
                            <option>Oscuro</option>
                            <option>Claro</option>
                        </select>
                    </div>

                    <!-- COLOR DE ACENTO -->
                    <div class="card config-card">
                        <h3>Color de acento</h3>

                        <div class="color-options">
                            <span class="color-circle" style="background:#ff4d4d;"></span>
                            <span class="color-circle" style="background:#facc15;"></span>
                            <span class="color-circle" style="background:#4ade80;"></span>
                            <span class="color-circle" style="background:#0ea5e9;"></span>
                            <span class="color-circle" style="background:#8b5cf6;"></span>
                        </div>
                    </div>

                    <!-- TAMAÑO DE FUENTE -->
                    <div class="card config-card">
                        <h3>Tamaño de fuente</h3>
                        <select class="config-select">
                            <option>Normal</option>
                            <option>Grande</option>
                            <option>Extra grande</option>
                        </select>
                    </div>

                    <!-- ANIMACIONES -->
                    <div class="card config-card">
                        <h3>Animaciones</h3>
                        <select class="config-select">
                            <option>Activadas</option>
                            <option>Desactivadas</option>
                        </select>
                    </div>

                    <!-- RESET -->
                    <div class="card config-card">
                        <h3>Restablecer datos</h3>
                        <button class="btn btn-danger">Restablecer todo</button>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/globalUser.js"></script>
    <script src="js/theme.js"></script>

</body>
</html>
