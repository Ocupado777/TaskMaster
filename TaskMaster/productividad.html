<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster | Productividad</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Global CSS -->
  <link rel="stylesheet" href="css/global.css">
  <!-- Productividad CSS -->
  <link rel="stylesheet" href="css/productividad.css">
</head>
<body class="light">
    <!-- Barra superior con campanita -->
  <nav class="navbar navbar-light bg-light px-3">
    <a class="navbar-brand">TaskMaster</a>
    <div class="ms-auto">
      <button class="btn btn-outline-secondary position-relative" id="btnNotificaciones">
        <i class="bi bi-bell"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="contadorNotificaciones">
          0
        </span>
      </button>
    </div>
  </nav>

  <!-- Modal Notificaciones -->
  <div class="modal fade" id="modalNotificaciones" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Notificaciones</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="listaNotificaciones">
          <!-- Aquí se cargan las notificaciones -->
        </div>
      </div>
    </div>
  </div>

  <div class="container py-5">
    <h2 class="text-center mb-4">Productividad</h2>

    <!-- Configuración del Timer -->
    <div class="mb-4">
      <h4>Configura tu tiempo</h4>
      <form id="formConfigTimer" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Horas</label>
          <input type="number" class="form-control" id="horasConfig" value="0" min="0">
        </div>
        <div class="col-md-6">
          <label class="form-label">Minutos</label>
          <input type="number" class="form-control" id="minutosConfig" value="25" min="0" max="59">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100">Aplicar Tiempo</button>
        </div>
      </form>
    </div>

    <!-- Pomodoro Timer -->
    <div class="text-center mb-5">
      <h4>Pomodoro Timer</h4>
      <div id="timer" class="display-4">00:25:00:000</div>
      <div class="mt-3">
        <button class="btn btn-success" onclick="iniciarPomodoro()">Iniciar</button>
        <button class="btn btn-warning" onclick="pausarPomodoro()">Pausar</button>
        <button class="btn btn-danger" onclick="reiniciarPomodoro()">Reiniciar</button>
      </div>
    </div>

    <!-- Historial de hábitos -->
    <div class="mb-5">
      <h4>Historial de hábitos</h4>
      <ul id="historialHabitos" class="list-group"></ul>
    </div>

    <!-- Logros -->
    <div>
      <h4>Logros</h4>
      <div id="logros" class="row"></div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global JS -->
  <script src="js/global.js"></script>
  <!-- Productividad JS -->
  <script src="js/productividad.js"></script>
</body>
</html>
