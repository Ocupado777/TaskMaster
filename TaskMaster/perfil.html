<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster | Perfil</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Global CSS -->
  <link rel="stylesheet" href="css/global.css">
  <!-- Perfil CSS -->
  <link rel="stylesheet" href="css/perfil.css">
</head>
<body class="light">
    <!-- Barra superior con campanita -->
  <nav class="navbar navbar-light bg-light px-3">
    <a class="navbar-brand">TaskMaster</a>
    <div class="ms-auto">
      <button class="btn btn-outline-secondary position-relative" id="btnNotificaciones">
        <i class="bi bi-bell"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="contadorNotificaciones">
          0
        </span>
      </button>
    </div>
  </nav>

  <!-- Modal Notificaciones -->
  <div class="modal fade" id="modalNotificaciones" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Notificaciones</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="listaNotificaciones">
          <!-- Aquí se cargan las notificaciones -->
        </div>
      </div>
    </div>
  </div>

  <div class="container py-5">
    <h2 class="text-center mb-4">Perfil de Usuario</h2>

    <div class="card shadow-sm p-4">
      <div class="text-center">
        <i class="bi bi-person-circle display-1"></i>
        <h4 id="nombreUsuario" class="mt-3">Usuario</h4>
        <p id="emailUsuario">correo@ejemplo.com</p>
      </div>
      <hr>
      <h5>Resumen</h5>
      <ul>
        <li id="perfilTareas">0 tareas creadas</li>
        <li id="perfilCompletadas">0 tareas completadas</li>
        <li id="perfilPomodoro">0 ciclos Pomodoro</li>
      </ul>
      <hr>
      <button class="btn btn-danger w-100" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global JS -->
  <script src="js/global.js"></script>
  <!-- Perfil JS -->
  <script src="js/perfil.js"></script>
</body>
</html>
