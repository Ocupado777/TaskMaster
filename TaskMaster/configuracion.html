<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster | Configuración</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Global CSS -->
  <link rel="stylesheet" href="css/global.css">
  <!-- Configuración CSS -->
  <link rel="stylesheet" href="css/configuracion.css">
</head>
<body class="light">
    <!-- Barra superior con campanita -->
  <nav class="navbar navbar-light bg-light px-3">
    <a class="navbar-brand">TaskMaster</a>
    <div class="ms-auto">
      <button class="btn btn-outline-secondary position-relative" id="btnNotificaciones">
        <i class="bi bi-bell"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="contadorNotificaciones">
          0
        </span>
      </button>
    </div>
  </nav>

  <!-- Modal Notificaciones -->
  <div class="modal fade" id="modalNotificaciones" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Notificaciones</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="listaNotificaciones">
          <!-- Aquí se cargan las notificaciones -->
        </div>
      </div>
    </div>
  </div>

  <div class="container py-5">
    <h2 class="text-center mb-4">Configuración</h2>

    <div class="card shadow-sm p-4">
      <h5>Tema</h5>
      <div class="btn-group w-100 mb-3">
        <button class="btn btn-light" onclick="cambiarTema('light')">Claro 🌞</button>
        <button class="btn btn-dark" onclick="cambiarTema('dark')">Oscuro 🌙</button>
        <button class="btn btn-primary" onclick="cambiarTema('premium')">Premium ✨</button>
      </div>

      <h5>Tamaño de Fuente</h5>
      <input type="range" class="form-range mb-3" min="14" max="24" value="16" id="fontSizeRange">

      <h5>Datos</h5>
      <button class="btn btn-danger w-100" onclick="resetDatos()">Resetear Todo ❌</button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global JS -->
  <script src="js/global.js"></script>
  <!-- Configuración JS -->
  <script src="js/configuracion.js"></script>
</body>
</html>
