<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster | Estadísticas</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Global CSS -->
  <link rel="stylesheet" href="css/global.css">
  <!-- Estadísticas CSS -->
  <link rel="stylesheet" href="css/estadisticas.css">
</head>
<body class="light">
    <!-- Barra superior con campanita -->
  <nav class="navbar navbar-light bg-light px-3">
    <a class="navbar-brand">TaskMaster</a>
    <div class="ms-auto">
      <button class="btn btn-outline-secondary position-relative" id="btnNotificaciones">
        <i class="bi bi-bell"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="contadorNotificaciones">
          0
        </span>
      </button>
    </div>
  </nav>

  <!-- Modal Notificaciones -->
  <div class="modal fade" id="modalNotificaciones" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Notificaciones</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="listaNotificaciones">
          <!-- Aquí se cargan las notificaciones -->
        </div>
      </div>
    </div>
  </div>

  <div class="container py-5">
    <h2 class="text-center mb-4">Estadísticas de Productividad</h2>

    <!-- KPIs -->
    <div class="row text-center mb-4">
      <div class="col-md-4">
        <div class="card shadow-sm p-3">
          <h5>Total de Tareas</h5>
          <p id="totalTareas" class="display-6">0</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm p-3">
          <h5>Productividad</h5>
          <p id="productividad" class="display-6">0%</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm p-3">
          <h5>Subtareas Completadas</h5>
          <p id="subtareasCompletadas" class="display-6">0</p>
        </div>
      </div>
    </div>

    <!-- Gráficas -->
    <div class="row">
      <div class="col-md-6 mb-4">
        <canvas id="graficoTareas"></canvas>
      </div>
      <div class="col-md-6 mb-4">
        <canvas id="graficoPrioridades"></canvas>
      </div>
    </div>

    <!-- Gráfico de productividad a lo largo del tiempo -->
    <div class="row">
      <div class="col-12 mb-4">
        <canvas id="graficoProductividad"></canvas>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Global JS -->
  <script src="js/global.js"></script>
  <!-- Estadísticas JS -->
  <script src="js/estadisticas.js"></script>
</body>
</html>
